<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<title>Sign Up</title>

<!-- TAB ICON -->
<link rel="icon" type="image/png" href="icon.png">

<!-- INSTAGRAM STYLE FONT -->
<link href="https://fonts.googleapis.com/css2?family=Grand+Hotel&display=swap" rel="stylesheet">

<style>

body{
font-family: Arial;
background-image:url("bg.png");
background-size:cover;
background-position:center;
background-repeat:no-repeat;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}


.container{
width:350px;
background:rgba(255,255,255,0.95);
border:1px solid #dbdbdb;
padding:40px;
text-align:center;
border-radius:8px;
}

.logo{
font-size:42px;
font-family:'Grand Hotel', cursive;
margin-bottom:20px;
display:flex;
align-items:center;
justify-content:center;
gap:10px;
}

.logo img{
width:42px;
height:42px;
mix-blend-mode:multiply;
}

input{
width:100%;
padding:10px;
margin:8px 0;
border:1px solid #dbdbdb;
background:#fafafa;
}

button{
width:100%;
padding:10px;
background:#4cb5f9;
border:none;
color:white;
font-weight:bold;
cursor:pointer;
}

button:hover{
background:#3897f0;
}

.message{
margin-top:10px;
color:green;
}

</style>

</head>

<body>

<div class="container">

<div class="logo">
<img src="icon.png">
Instagram
</div>

<h3>Create Account</h3>

<input type="text" id="username" placeholder="Username">
<input type="password" id="password" placeholder="Password">

<button onclick="signup()">Sign Up</button>

<p class="message" id="msg"></p>

</div>


<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";


const firebaseConfig = {
  apiKey: "AIzaSyAMMW9hez5lJUhE6ryvwuVJYJ1wJ89Ycoc",
  authDomain: "insta-c893d.firebaseapp.com",
  projectId: "insta-c893d",
  storageBucket: "insta-c893d.firebasestorage.app",
  messagingSenderId: "915463283088",
  appId: "1:915463283088:web:ddf859056bb132521ad315",
  measurementId: "G-QM70V1P5XE"
};


const app = initializeApp(firebaseConfig);
const db = getFirestore(app);


window.signup = async function(){

let user=document.getElementById("username").value
let pass=document.getElementById("password").value

try{

await addDoc(collection(db,"users"),{
username:user,
password:pass
})

document.getElementById("msg").innerText="Account created successfully!"

}
catch(error){

document.getElementById("msg").innerText="Error saving data"

}

}

</script>

</body>
</html>
